name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (default: auto from git sha)"
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false    # never cancel a mid-flight deploy

jobs:
  # ── 1. Unit tests (gate before eval) ──────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short
        env:
          SALES_COMPANION_API_KEYS: test-key

  # ── 2. On-demand eval gate (runs against live Databricks) ─────────────────
  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    environment: production

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VS_ENDPOINT: ${{ secrets.VS_ENDPOINT }}
      EMBED_ENDPOINT: ${{ secrets.EMBED_ENDPOINT }}
      AGENT_VERSION: ${{ github.event.inputs.version || github.sha }}
      TRIGGERED_BY: github-actions

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"

      - name: Run eval against all agents
        run: python eval/run_eval.py --agent all
        # Non-zero exit blocks the deploy — no override

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: mlruns/
          retention-days: 30

  # ── 3. Deploy serving layer ───────────────────────────────────────────────
  deploy-serving:
    name: Deploy Serving Endpoint
    runs-on: ubuntu-latest
    needs: eval-gate
    environment: production

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      AGENT_VERSION: ${{ github.event.inputs.version || github.sha }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e "." databricks-sdk mlflow

      - name: Log model + update endpoint
        run: |
          python scripts/deploy_serving.py \
            --endpoint sales-companion-api \
            --version "$AGENT_VERSION"

      - name: Smoke test endpoint
        run: |
          python - <<'EOF'
          import os, requests, sys
          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]
          resp = requests.post(
            f"{host}/serving-endpoints/sales-companion-api/invocations",
            headers={"Authorization": f"Bearer {token}"},
            json={"dataframe_records": [{"query": "health check", "user_id": "ci"}]},
            timeout=30,
          )
          if resp.status_code != 200:
            print(f"Smoke test failed: {resp.status_code} {resp.text}")
            sys.exit(1)
          print("Smoke test passed")
          EOF

  # ── 4. Deploy frontend ─────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: eval-gate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and deploy
        run: ./scripts/deploy_frontend.sh prod
        env:
          VITE_API_KEY: ${{ secrets.FRONTEND_API_KEY }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ── 5. Notify on failure ───────────────────────────────────────────────────
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, eval-gate, deploy-serving, deploy-frontend]
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "::error::Deploy pipeline failed on branch ${{ github.ref }} at commit ${{ github.sha }}"
          echo "Check the failing job above and re-run after fixing."
