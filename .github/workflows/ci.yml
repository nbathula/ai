name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agents/ serving/ ingestion/ eval/ tests/

      - name: Type check (mypy)
        run: mypy agents/ serving/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # non-blocking in CI for now

      - name: Unit tests
        run: pytest tests/ -v --tb=short
        env:
          SALES_COMPANION_API_KEYS: test-key

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_KEY: ci-placeholder-key
